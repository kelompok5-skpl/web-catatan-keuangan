<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - Catatan Keuangan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #2196F3;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  background: #ffffff;
  width: 320px;
  padding: 24px;
  border-radius: 14px;
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.login-box h3 {
  margin-bottom: 20px;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

.login-box button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #2196F3;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
}

.login-box button:hover {
  background: #1e88e5;
}

.login-box p {
  font-size: 12px;
  color: #777;
  margin-top: 12px;
}
</style>
</head>

<body>

<div class="login-box">
  <h3>Login</h3>
  <input type="password" placeholder="Masukkan PIN">
  <button onclick="masuk()">Masuk</button>
  <p>*Login dummy</p>
</div>

<script>
function masuk() {
  // login dummy, langsung masuk ke sistem
  window.location.href = "home.html";
}
</script>

</body>
</html>
