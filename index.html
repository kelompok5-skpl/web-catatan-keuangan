<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>CatatUang - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* RESET */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* BODY */
body {
  font-family: Arial, sans-serif;
  background: #2196F3;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CARD LOGIN */
.auth-card {
  background: #ffffff;
  width: 320px;
  padding: 26px;
  border-radius: 18px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.25);
  text-align: center;
}

/* LOGO */
.logo {
  font-size: 28px;
  font-weight: bold;
  color: #2196F3;
  margin-bottom: 22px;
}

/* INPUT WRAPPER */
.form-group {
  width: 100%;
  margin-bottom: 12px;
}

/* INPUT */
.form-group input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #2196F3;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  margin-top: 8px;
}

.btn.secondary {
  background: #1e88e5;
}

/* LINK */
.skip {
  margin-top: 14px;
  font-size: 13px;
  color: #2196F3;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="auth-card">
  <div class="logo">💰 CatatUang</div>

  <div class="form-group">
    <input type="text" placeholder="Email (dummy)">
  </div>

  <div class="form-group">
    <input type="password" placeholder="PIN">
  </div>

  <button class="btn" onclick="masuk()">Sign In</button>
  <button class="btn secondary" onclick="masuk()">Sign Up</button>

  <div class="skip" onclick="masuk()">Lewati tanpa login</div>
</div>

<script>
function masuk() {
  window.location.href = "home.html";
}
</script>

</body>
</html>
