<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Catatan Keuangan - Web Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#f2f4f8; }
    header { background:linear-gradient(135deg,#2196F3,#1e88e5); color:#fff; padding:16px; text-align:center; font-size:18px; font-weight:600; }
    .content { padding:16px; margin-bottom:90px; }
    .card { background:#fff; padding:16px; border-radius:14px; margin-bottom:14px; box-shadow:0 6px 14px rgba(0,0,0,0.08); }
    .empty { text-align:center; color:#999; margin-top:60px; font-size:14px; }

    nav { position:fixed; bottom:0; left:0; right:0; background:#fff; display:flex; border-top:1px solid #ddd; }
    nav button { flex:1; padding:10px 4px; background:none; border:none; font-size:12px; color:#777; }
    nav button.active { color:#2196F3; font-weight:600; }

    /* FAB */
    .fab { position:fixed; right:20px; bottom:90px; background:#2196F3; color:#fff; width:56px; height:56px; border-radius:50%; font-size:32px; border:none; box-shadow:0 6px 14px rgba(0,0,0,0.3); cursor:pointer; }
    .fab-menu { position:fixed; right:20px; bottom:160px; display:none; flex-direction:column; gap:10px; }
    .fab-menu button { background:#fff; border:none; padding:10px 14px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.15); font-size:13px; cursor:pointer; }

    /* Modal */
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); }
    .modal-content { background:#fff; width:90%; max-width:400px; margin:80px auto; padding:20px; border-radius:14px; }
    input, select, textarea { width:100%; padding:10px; margin:8px 0; }
    .btn { background:#2196F3; color:#fff; border:none; padding:10px; border-radius:8px; width:100%; }
    .hidden { display:none; }
  </style>
</head>
<body>

<header id="title">Transaksi</header>

<div class="content">
  <div id="transaksi"><div class="empty">Belum ada transaksi</div></div>
  <div id="rekening" class="hidden"><div class="card">Saldo Rekening</div></div>
  <div id="rekap" class="hidden"><div class="card">Laporan Keuangan</div></div>
  <div id="hutang" class="hidden"><div class="empty">Tidak ada data hutang</div></div>
  <div id="setting" class="hidden"><div class="card">Pengaturan Aplikasi</div></div>
</div>

<!-- FAB -->
<div class="fab-menu" id="fabMenu">
  <button onclick="openModal()">Pemasukan</button>
  <button onclick="openModal()">Pengeluaran</button>
  <button>Pindah Saldo</button>
</div>
<button class="fab" onclick="toggleFab()">+</button>

<!-- Modal Transaksi -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Tambah Transaksi</h3>
    <input type="number" placeholder="Nominal">
    <select>
      <option>Kebutuhan Pokok</option>
      <option>Transportasi</option>
      <option>Hiburan</option>
      <option>Lainnya</option>
    </select>
    <input type="date">
    <textarea placeholder="Deskripsi"></textarea>
    <button class="btn" onclick="closeModal()">Simpan</button>
  </div>
</div>

<nav>
  <button class="active" onclick="show('transaksi','Transaksi',this)">Transaksi</button>
  <button onclick="show('rekening','Rekening',this)">Rekening</button>
  <button onclick="show('rekap','Rekap',this)">Rekap</button>
  <button onclick="show('hutang','Hutang',this)">Hutang</button>
  <button onclick="show('setting','Setting',this)">Setting</button>
</nav>

<script>
  function show(id, title, el) {
    document.querySelectorAll('.content > div').forEach(d => d.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.getElementById('title').innerText = title;
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }
  function toggleFab() {
    const menu = document.getElementById('fabMenu');
    menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
  }
  function openModal(){ document.getElementById('modal').style.display='block'; }
  function closeModal(){ document.getElementById('modal').style.display='none'; }
</script>

</body>
</html>
