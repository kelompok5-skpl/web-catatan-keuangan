<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>CatatUang</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f2f4f8}

/* HEADER */
header{
  background:#2196F3;
  color:#fff;
  padding:14px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

/* CONTENT */
.content{padding:14px;padding-bottom:90px}

/* CARD */
.card{
  background:#fff;
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.08)
}

/* EMPTY */
.empty{
  text-align:center;
  color:#aaa;
  margin-top:60px;
}
.empty img{width:150px;opacity:.8}

/* FAB */
.fab{
  position:fixed;
  right:20px;
  bottom:90px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:#2196F3;
  color:#fff;
  font-size:32px;
  border:none;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
}
.modal-content{
  background:#fff;
  width:90%;
  max-width:340px;
  margin:100px auto;
  padding:20px;
  border-radius:14px;
}
input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  box-sizing:border-box;
}
.modal-content button{
  width:100%;
  padding:10px;
  margin-top:12px;
  border:none;
  border-radius:8px;
}
.btn-primary{background:#2196F3;color:#fff}
.btn-cancel{background:#ccc;color:#000}

/* NAV */
nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  display:flex;
  border-top:1px solid #ddd;
}
nav button{
  flex:1;
  padding:10px;
  border:none;
  background:none;
  font-size:12px;
  color:#555;
  cursor:pointer;
}
nav button.active{
  color:#2196F3;
  font-weight:bold;
}
</style>
</head>

<body>

<header>💰 CatatUang</header>

<div class="content">

<!-- HOME -->
<div id="home">
  <div class="card" style="text-align:center">
    <div style="font-size:48px">💰</div>
    <h2 style="margin:6px 0;color:#2196F3">CatatUang</h2>
    <p style="font-size:13px;color:#777">
      Aplikasi pencatatan keuangan sederhana
    </p>
  </div>

  <div class="card">
    <b>Saldo:</b> Rp <span id="saldo">0</span>
  </div>
</div>

<!-- TRANSAKSI -->
<div id="transaksi" style="display:none">
  <div id="transaksiList"></div>

  <div id="transaksiEmpty" class="empty">
    <img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png">
    <p>Tidak ada data</p>
  </div>
</div>

<!-- REKAP -->
<div id="rekap" style="display:none">
  <div id="rekapContent"></div>

  <div id="rekapEmpty" class="empty">
    <img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png">
    <p>Tidak ada data</p>
  </div>
</div>

<!-- HUTANG -->
<div id="hutang" style="display:none">
  <div class="empty">
    <img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png">
    <p>Tidak ada data</p>
  </div>
</div>

<!-- SETELAN -->
<div id="setelan" style="display:none">
  <div class="card">
    Tema: Default<br><br>
    Bahasa: Indonesia<br><br>
    Keamanan: PIN (dummy)
    <button style="background:#e53935;color:#fff;margin-top:14px"
      onclick="resetData()">Reset Semua Data</button>
  </div>
</div>

</div>

<!-- FAB -->
<button class="fab" onclick="openModal()">+</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Tambah Transaksi</h3>

    <select id="jenis">
      <option value="pemasukan">Pemasukan</option>
      <option value="pengeluaran">Pengeluaran</option>
      <option value="hutang">Hutang</option>
    </select>

    <input type="number" id="nominal" placeholder="Nominal">

    <select id="kategori">
      <option>Kebutuhan Pokok</option>
      <option>Transportasi</option>
      <option>Hiburan</option>
      <option>Umum</option>
    </select>

    <button class="btn-primary" onclick="simpan()">Simpan</button>
    <button class="btn-cancel" onclick="closeModal()">Batal</button>
  </div>
</div>

<nav>
  <button class="active" onclick="show('home',this)">Home</button>
  <button onclick="show('transaksi',this)">Transaksi</button>
  <button onclick="show('rekap',this)">Rekap</button>
  <button onclick="show('hutang',this)">Hutang</button>
  <button onclick="show('setelan',this)">Setelan</button>
</nav>

<script>
let data = JSON.parse(localStorage.getItem('data')) || [];
let hutang = JSON.parse(localStorage.getItem('hutang')) || [];

const saldoEl = document.getElementById('saldo');
const transaksiList = document.getElementById('transaksiList');
const transaksiEmpty = document.getElementById('transaksiEmpty');
const rekapContent = document.getElementById('rekapContent');
const rekapEmpty = document.getElementById('rekapEmpty');
const modal = document.getElementById('modal');

function show(id,el){
  document.querySelectorAll('.content>div').forEach(d=>d.style.display='none');
  document.getElementById(id).style.display='block';

  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

  render();
}

function openModal(){modal.style.display='block'}
function closeModal(){modal.style.display='none'}

function simpan(){
  if(!nominal.value) return alert("Nominal wajib diisi");

  if(jenis.value === 'hutang'){
    hutang.push({
      nominal: +nominal.value
    });
    localStorage.setItem('hutang', JSON.stringify(hutang));
  } else {
    data.push({
      jenis: jenis.value,
      nominal: +nominal.value,
      kategori: kategori.value
    });
    localStorage.setItem('data', JSON.stringify(data));
  }

  nominal.value='';
  closeModal();
  render();
}

function resetData(){
  let pin=prompt("Masukkan PIN:");
  if(pin){
    localStorage.clear();
    data=[];
    render();
  }
}

function resetData(){
  let pin = prompt("Masukkan PIN:");
  if(pin){
    localStorage.clear();
    data = [];
    hutang = [];
    render();
  }
}

function render(){
  let saldo=0, masuk=0, keluar=0;
  transaksiList.innerHTML='';
  rekapContent.innerHTML='';

  if(data.length===0){
    transaksiEmpty.style.display='block';
    rekapEmpty.style.display='block';
  }else{
    transaksiEmpty.style.display='none';
    rekapEmpty.style.display='none';
  }

  data.forEach(d=>{
    if(d.jenis==='pemasukan'){saldo+=d.nominal;masuk+=d.nominal}
    else{saldo-=d.nominal;keluar+=d.nominal}

    transaksiList.innerHTML+=`
      <div class="card">
        <b>${d.jenis}</b><br>
        Rp ${d.nominal}<br>
        ${d.kategori}
      </div>`;
  });

  saldoEl.innerText=saldo;

  if(data.length>0){
    rekapContent.innerHTML=`
      <div class="card">Pemasukan: Rp ${masuk}</div>
      <div class="card">Pengeluaran: Rp ${keluar}</div>
      <div class="card">Selisih: Rp ${masuk-keluar}</div>
      <div class="card">Sisa Saldo: Rp ${saldo}</div>`;
  }
  const hutangBox = document.getElementById('hutang');

hutangBox.innerHTML = '';

if(hutang.length === 0){
  hutangBox.innerHTML = `
    <div class="empty">
      <img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png">
      <p>Tidak ada data</p>
    </div>`;
} else {
  hutang.forEach(h => {
    hutangBox.innerHTML += `
      <div class="card">
        Hutang: Rp ${h.nominal}
      </div>`;
  });
}
}

render();
</script>

</body>
</html>
